<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 875" preserveAspectRatio="xMidYMid slice">
<defs>
  <linearGradient id="np" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0A2240"/>
    <stop offset="100%" stop-color="#061528"/>
  </linearGradient>
  <radialGradient id="npg" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0%" stop-color="#C8A45C" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#C8A45C" stop-opacity="0"/>
  </radialGradient>
</defs>
<rect width="1400" height="875" fill="url(#np)"/>
<rect width="1400" height="875" fill="url(#npg)"/>
<!-- handshake -->
<g fill="#F7F8FA" transform="translate(700,440)">
  <!-- left forearm -->
  <path d="M -340 -40 Q -240 -50 -100 -20 L -80 30 Q -240 30 -340 50 Z"/>
  <!-- right forearm -->
  <path d="M 340 -40 Q 240 -50 100 -20 L 80 30 Q 240 30 340 50 Z"/>
  <!-- left hand -->
  <path d="M -100 -30 Q -40 -50 0 0 Q -40 50 -100 30 Z"/>
  <!-- right hand -->
  <path d="M 100 -30 Q 40 -50 0 0 Q 40 50 100 30 Z"/>
</g>
<!-- gold ring at clasp -->
<circle cx="700" cy="440" r="40" fill="none" stroke="#C8A45C" stroke-width="6" opacity="0.7"/>
<!-- crests on each side -->
<g transform="translate(280,440)" fill="none" stroke="#C8A45C" stroke-width="3" opacity="0.6">
  <path d="M -60 -60 L 0 -90 L 60 -60 L 60 30 Q 0 80 -60 30 Z" fill="#0A2240"/>
  <text x="0" y="6" font-family="Playfair Display, serif" font-style="italic" font-size="36" text-anchor="middle" fill="#C8A45C" stroke="none">H</text>
</g>
<g transform="translate(1120,440)" fill="none" stroke="#C8A45C" stroke-width="3" opacity="0.6">
  <path d="M -60 -60 L 0 -90 L 60 -60 L 60 30 Q 0 80 -60 30 Z" fill="#0A2240"/>
  <text x="0" y="6" font-family="Playfair Display, serif" font-style="italic" font-size="36" text-anchor="middle" fill="#C8A45C" stroke="none">N</text>
</g>
<!-- connecting line -->
<line x1="340" y1="440" x2="660" y2="440" stroke="#C8A45C" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
<line x1="740" y1="440" x2="1060" y2="440" stroke="#C8A45C" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
<text x="700" y="700" font-family="Inter, sans-serif" font-size="18" letter-spacing="6" text-anchor="middle" fill="#C8A45C" font-weight="600">STRATEGIC · MEMORANDUM</text>
</svg>
