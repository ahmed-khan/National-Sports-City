<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
<defs>
  <linearGradient id="vt" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#1B4E78"/>
    <stop offset="100%" stop-color="#0A2240"/>
  </linearGradient>
</defs>
<rect width="800" height="800" fill="url(#vt)"/>
<!-- dumbbells -->
<g fill="#F7F8FA" transform="translate(400,420)">
  <!-- bar -->
  <rect x="-220" y="-12" width="440" height="24" rx="3"/>
  <!-- weights -->
  <rect x="-280" y="-50" width="50" height="100" rx="4" fill="#0A2240" stroke="#C8A45C" stroke-width="3"/>
  <rect x="-340" y="-70" width="50" height="140" rx="4" fill="#0A2240" stroke="#C8A45C" stroke-width="3"/>
  <rect x="230" y="-50" width="50" height="100" rx="4" fill="#0A2240" stroke="#C8A45C" stroke-width="3"/>
  <rect x="290" y="-70" width="50" height="140" rx="4" fill="#0A2240" stroke="#C8A45C" stroke-width="3"/>
</g>
<!-- motion lines -->
<g stroke="#C8A45C" stroke-width="3" stroke-opacity="0.5" stroke-linecap="round">
  <line x1="200" y1="350" x2="240" y2="320"/>
  <line x1="560" y1="350" x2="600" y2="320"/>
  <line x1="200" y1="510" x2="240" y2="540"/>
  <line x1="560" y1="510" x2="600" y2="540"/>
</g>
<text x="400" y="640" font-family="Inter,sans-serif" font-size="14" letter-spacing="6" text-anchor="middle" fill="#C8A45C" font-weight="600">HIGH · PERFORMANCE</text>
</svg>
