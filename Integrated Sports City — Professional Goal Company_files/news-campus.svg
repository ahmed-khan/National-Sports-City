<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 875" preserveAspectRatio="xMidYMid slice">
<defs>
  <linearGradient id="nc" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#06251A"/>
    <stop offset="100%" stop-color="#0A2240"/>
  </linearGradient>
  <pattern id="ncgrid" width="35" height="35" patternUnits="userSpaceOnUse">
    <path d="M 35 0 L 0 0 0 35" fill="none" stroke="rgba(200,164,92,0.08)" stroke-width="0.7"/>
  </pattern>
</defs>
<rect width="1400" height="875" fill="url(#nc)"/>
<rect width="1400" height="875" fill="url(#ncgrid)"/>
<!-- main pitch -->
<g stroke="#C8A45C" stroke-width="2" fill="rgba(200,164,92,0.05)" stroke-opacity="0.7">
  <rect x="120" y="120" width="640" height="380" rx="4"/>
  <line x1="440" y1="120" x2="440" y2="500"/>
  <circle cx="440" cy="310" r="58" fill="none"/>
  <rect x="120" y="220" width="58" height="180" fill="none"/>
  <rect x="702" y="220" width="58" height="180" fill="none"/>
</g>
<text x="120" y="100" fill="#C8A45C" font-family="Inter,sans-serif" font-size="12" letter-spacing="3" font-weight="600">A · MAIN STADIUM</text>
<!-- training pitches -->
<g stroke="#C8A45C" stroke-opacity="0.45" stroke-width="1.5" fill="rgba(200,164,92,0.03)">
  <rect x="820" y="120" width="240" height="180" rx="3"/>
  <line x1="940" y1="120" x2="940" y2="300"/>
  <circle cx="940" cy="210" r="24" fill="none"/>
</g>
<text x="820" y="100" fill="#C8A45C" font-family="Inter,sans-serif" font-size="12" letter-spacing="3" font-weight="600">B · TRAINING</text>
<g stroke="#C8A45C" stroke-opacity="0.45" stroke-width="1.5" fill="rgba(200,164,92,0.03)">
  <rect x="820" y="320" width="240" height="180" rx="3"/>
  <line x1="940" y1="320" x2="940" y2="500"/>
  <circle cx="940" cy="410" r="24" fill="none"/>
</g>
<!-- science lab -->
<g stroke="#FF6B9D" stroke-width="2" fill="rgba(255,107,157,0.06)">
  <rect x="1100" y="120" width="220" height="240" rx="6"/>
</g>
<g stroke="#FF6B9D" stroke-opacity="0.4" fill="none">
  <line x1="1100" y1="180" x2="1320" y2="180"/>
  <line x1="1100" y1="240" x2="1320" y2="240"/>
  <line x1="1100" y1="300" x2="1320" y2="300"/>
</g>
<text x="1100" y="100" fill="#FF6B9D" font-family="Inter,sans-serif" font-size="12" letter-spacing="3" font-weight="600">C · SCIENCE LAB</text>
<!-- boarding academy -->
<g stroke="#C8A45C" stroke-width="2" fill="rgba(200,164,92,0.08)">
  <rect x="120" y="560" width="940" height="220" rx="6"/>
</g>
<g stroke="#C8A45C" stroke-opacity="0.4" fill="none">
  <line x1="120" y1="630" x2="1060" y2="630"/>
  <line x1="120" y1="700" x2="1060" y2="700"/>
  <g stroke-width="0.8">
    <line x1="220" y1="560" x2="220" y2="780"/>
    <line x1="320" y1="560" x2="320" y2="780"/>
    <line x1="420" y1="560" x2="420" y2="780"/>
    <line x1="520" y1="560" x2="520" y2="780"/>
    <line x1="620" y1="560" x2="620" y2="780"/>
    <line x1="720" y1="560" x2="720" y2="780"/>
    <line x1="820" y1="560" x2="820" y2="780"/>
    <line x1="920" y1="560" x2="920" y2="780"/>
  </g>
</g>
<text x="120" y="540" fill="#C8A45C" font-family="Inter,sans-serif" font-size="12" letter-spacing="3" font-weight="600">D · BOARDING ACADEMY</text>
<!-- medical -->
<g stroke="#1B6FA8" stroke-width="2" fill="rgba(27,111,168,0.08)">
  <rect x="1100" y="380" width="220" height="160" rx="6"/>
  <path d="M 1190 420 L 1230 420 L 1230 450 L 1260 450 L 1260 480 L 1230 480 L 1230 510 L 1190 510 L 1190 480 L 1160 480 L 1160 450 L 1190 450 Z" fill="#1B6FA8" opacity="0.5" stroke="none"/>
</g>
<text x="1100" y="360" fill="#1B6FA8" font-family="Inter,sans-serif" font-size="12" letter-spacing="3" font-weight="600">E · MEDICAL</text>
<!-- S&C -->
<g stroke="#C8A45C" stroke-opacity="0.5" stroke-width="1.5" fill="rgba(200,164,92,0.04)">
  <rect x="1100" y="560" width="220" height="220" rx="6"/>
</g>
<text x="1100" y="540" fill="#C8A45C" font-family="Inter,sans-serif" font-size="12" letter-spacing="3" font-weight="600">F · STRENGTH</text>
<!-- compass -->
<g transform="translate(1340,820)">
  <circle r="22" fill="none" stroke="#C8A45C" stroke-opacity="0.6"/>
  <path d="M 0 -16 L 5 0 L 0 16 L -5 0 Z" fill="#C8A45C"/>
  <text y="-30" font-family="Inter,sans-serif" font-size="10" text-anchor="middle" fill="#C8A45C" letter-spacing="3">N</text>
</g>
</svg>
