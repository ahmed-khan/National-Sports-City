<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 875" preserveAspectRatio="xMidYMid slice">
<defs>
  <linearGradient id="no" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3D2E5C"/>
    <stop offset="100%" stop-color="#0A2240"/>
  </linearGradient>
  <radialGradient id="nog" cx="0.5" cy="0.4" r="0.5">
    <stop offset="0%" stop-color="#C8A45C" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#C8A45C" stop-opacity="0"/>
  </radialGradient>
</defs>
<rect width="1400" height="875" fill="url(#no)"/>
<ellipse cx="700" cy="380" rx="600" ry="400" fill="url(#nog)"/>
<!-- torch -->
<g transform="translate(700,500)">
  <!-- flame -->
  <path d="M -50 -180 Q -80 -100 -40 -40 Q -10 -80 0 -160 Q 10 -80 40 -40 Q 80 -100 50 -180 Q 30 -100 0 -200 Q -30 -100 -50 -180 Z" fill="#C8A45C"/>
  <path d="M -25 -160 Q -40 -90 -20 -50 Q 0 -90 0 -150 Q 0 -90 20 -50 Q 40 -90 25 -160 Q 12 -100 0 -180 Q -12 -100 -25 -160 Z" fill="#F7F8FA"/>
  <!-- handle -->
  <path d="M -25 -30 L 25 -30 L 30 200 L -30 200 Z" fill="#F7F8FA"/>
  <rect x="-35" y="-40" width="70" height="20" fill="#C8A45C"/>
  <!-- handle accents -->
  <g stroke="#C8A45C" stroke-width="2" fill="none">
    <line x1="-30" y1="20" x2="30" y2="20"/>
    <line x1="-30" y1="80" x2="30" y2="80"/>
    <line x1="-30" y1="140" x2="30" y2="140"/>
  </g>
</g>
<!-- olympic rings -->
<g fill="none" stroke-width="6" transform="translate(700,780)" opacity="0.65">
  <circle cx="-160" cy="-10" r="34" stroke="#1B6FA8"/>
  <circle cx="-80" cy="10" r="34" stroke="#FFB627"/>
  <circle cx="0" cy="-10" r="34" stroke="#0A2240"/>
  <circle cx="80" cy="10" r="34" stroke="#00B85C"/>
  <circle cx="160" cy="-10" r="34" stroke="#E6553F"/>
</g>
<!-- floating particles -->
<g fill="#C8A45C">
  <circle cx="400" cy="200" r="3" opacity="0.6"/>
  <circle cx="500" cy="150" r="2" opacity="0.5"/>
  <circle cx="900" cy="180" r="3" opacity="0.6"/>
  <circle cx="1000" cy="220" r="2" opacity="0.4"/>
  <circle cx="350" cy="380" r="2" opacity="0.5"/>
  <circle cx="1050" cy="380" r="2" opacity="0.5"/>
</g>
</svg>
