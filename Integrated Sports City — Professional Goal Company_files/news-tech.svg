<!-- gradient under -->
<path d="M 100 600 L 250 500 L 400 540 L 550 420 L 700 360 L 850 280 L 1000 220 L 1150 160 L 1300 100 L 1300 800 L 100 800 Z"
      fill="#C8A45C" opacity="0.08"/>
<!-- data points -->
<g fill="#F7F8FA">
  <circle cx="100" cy="600" r="6"/>
  <circle cx="250" cy="500" r="6"/>
  <circle cx="400" cy="540" r="6"/>
  <circle cx="550" cy="420" r="6"/>
  <circle cx="700" cy="360" r="6"/>
  <circle cx="850" cy="280" r="6"/>
  <circle cx="1000" cy="220" r="6"/>
  <circle cx="1150" cy="160" r="6"/>
  <circle cx="1300" cy="100" r="6"/>
</g>
<!-- bars below -->
<g fill="#C8A45C" opacity="0.4">
  <rect x="80" y="720" width="40" height="80"/>
  <rect x="230" y="700" width="40" height="100"/>
  <rect x="380" y="730" width="40" height="70"/>
  <rect x="530" y="680" width="40" height="120"/>
  <rect x="680" y="660" width="40" height="140"/>
  <rect x="830" y="640" width="40" height="160"/>
  <rect x="980" y="620" width="40" height="180"/>
  <rect x="1130" y="600" width="40" height="200"/>
  <rect x="1280" y="580" width="40" height="220"/>
</g>
<!-- circular ai node top right -->
<g transform="translate(1200,180)">
  <circle r="60" fill="none" stroke="#C8A45C" stroke-opacity="0.4" stroke-dasharray="6 4"/>
  <circle r="36" fill="none" stroke="#C8A45C"/>
  <circle r="8" fill="#C8A45C"/>
</g>
<text x="700" y="850" font-family="Inter, sans-serif" font-size="16" letter-spacing="6" text-anchor="middle" fill="#C8A45C" font-weight="600">AI · PERFORMANCE · GRAPH</text>
</svg>
