  <line x1="300" y1="0" x2="300" y2="875"/>
  <line x1="500" y1="0" x2="500" y2="875"/>
  <line x1="700" y1="0" x2="700" y2="875"/>
  <line x1="900" y1="0" x2="900" y2="875"/>
  <line x1="1100" y1="0" x2="1100" y2="875"/>
  <line x1="1300" y1="0" x2="1300" y2="875"/>
</g>
<!-- line chart -->
<path d="M 100 600 L 250 500 L 400 540 L 550 420 L 700 360 L 850 280 L 1000 220 L 1150 160 L 1300 100"
