<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 875" preserveAspectRatio="xMidYMid slice">
<defs>
  <linearGradient id="nx" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0A2240"/>
    <stop offset="100%" stop-color="#020A18"/>
  </linearGradient>
</defs>
<rect width="1400" height="875" fill="url(#nx)"/>
<!-- grid backdrop -->
<g stroke="rgba(200,164,92,0.06)" stroke-width="1">
  <line x1="0" y1="100" x2="1400" y2="100"/>
  <line x1="0" y1="250" x2="1400" y2="250"/>
  <line x1="0" y1="400" x2="1400" y2="400"/>
  <line x1="0" y1="550" x2="1400" y2="550"/>
  <line x1="0" y1="700" x2="1400" y2="700"/>
