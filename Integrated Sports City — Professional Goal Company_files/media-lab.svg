<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" preserveAspectRatio="xMidYMid slice">
<defs>
  <linearGradient id="ml" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0A2240"/>
    <stop offset="100%" stop-color="#020A18"/>
  </linearGradient>
</defs>
<rect width="1000" height="750" fill="url(#ml)"/>
<!-- monitor frame -->
<g fill="none" stroke="#C8A45C" stroke-width="3" opacity="0.7">
  <rect x="80" y="80" width="840" height="540" rx="8"/>
  <line x1="80" y1="140" x2="920" y2="140"/>
</g>
<!-- header dots -->
<g fill="#C8A45C" opacity="0.7">
  <circle cx="110" cy="110" r="6"/>
  <circle cx="140" cy="110" r="6"/>
  <circle cx="170" cy="110" r="6"/>
</g>
<!-- left chart: line -->
<g transform="translate(120,200)">
  <path d="M 0 250 L 60 200 L 120 220 L 180 150 L 240 100 L 300 60 L 360 30" stroke="#C8A45C" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 0 250 L 60 200 L 120 220 L 180 150 L 240 100 L 300 60 L 360 30 L 360 280 L 0 280 Z" fill="#C8A45C" opacity="0.1"/>
  <g stroke="rgba(247,248,250,0.08)" stroke-width="1">
    <line x1="0" y1="50" x2="360" y2="50"/>
    <line x1="0" y1="120" x2="360" y2="120"/>
    <line x1="0" y1="190" x2="360" y2="190"/>
    <line x1="0" y1="260" x2="360" y2="260"/>
  </g>
</g>
<!-- right side: data values -->
<g transform="translate(560,200)" font-family="Inter, sans-serif" fill="#F7F8FA">
  <text font-size="14" fill="#C8A45C" letter-spacing="3" font-weight="600">VO2 MAX</text>
  <text y="50" font-size="56" font-family="Playfair Display, serif" font-style="italic">68.4</text>
  <text y="100" font-size="14" fill="#C8A45C" letter-spacing="3" font-weight="600">SPRINT · 100M</text>
  <text y="150" font-size="56" font-family="Playfair Display, serif" font-style="italic">11.8s</text>
  <text y="200" font-size="14" fill="#C8A45C" letter-spacing="3" font-weight="600">RECOVERY</text>
  <g transform="translate(0,220)">
    <rect width="280" height="14" rx="7" fill="rgba(247,248,250,0.12)"/>
    <rect width="218" height="14" rx="7" fill="#C8A45C"/>
  </g>
</g>
<!-- bottom data -->
<g fill="#F7F8FA" opacity="0.5">
  <rect x="120" y="540" width="120" height="6" rx="3"/>
  <rect x="260" y="540" width="160" height="6" rx="3"/>
  <rect x="440" y="540" width="80" height="6" rx="3"/>
  <rect x="540" y="540" width="200" height="6" rx="3"/>
</g>
<text x="500" y="700" font-family="Inter,sans-serif" font-size="14" letter-spacing="6" text-anchor="middle" fill="#C8A45C" font-weight="600">PERFORMANCE · LAB</text>
</svg>
