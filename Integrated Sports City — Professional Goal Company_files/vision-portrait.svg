<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
<defs>
  <linearGradient id="vp" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0F3265"/>
    <stop offset="100%" stop-color="#061528"/>
  </linearGradient>
  <radialGradient id="vpg" cx="0.5" cy="0.35" r="0.5">
    <stop offset="0%" stop-color="#C8A45C" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#C8A45C" stop-opacity="0"/>
  </radialGradient>
</defs>
<rect width="800" height="1000" fill="url(#vp)"/>
<ellipse cx="400" cy="350" rx="350" ry="500" fill="url(#vpg)"/>
<!-- silhouette portrait -->
<g fill="#F7F8FA">
  <!-- head -->
  <circle cx="400" cy="340" r="140"/>
  <!-- neck -->
  <rect x="370" y="450" width="60" height="70"/>
  <!-- shoulders/torso -->
  <path d="M 200 1000 Q 200 600 400 540 Q 600 600 600 1000 Z"/>
</g>
<!-- jersey detail -->
<path d="M 320 580 L 400 660 L 480 580 L 480 660 L 400 720 L 320 660 Z" fill="#0A2240"/>
<path d="M 340 600 L 400 650 L 460 600 L 460 640 L 400 685 L 340 640 Z" fill="#C8A45C"/>
<!-- gold accent rim light on head right -->
<path d="M 540 340 Q 530 200 400 200 L 400 220 Q 510 220 520 340 Z" fill="#C8A45C" opacity="0.5"/>
<!-- shadow on torso -->
<ellipse cx="400" cy="540" rx="120" ry="20" fill="#0A2240" opacity="0.4"/>
<!-- floating gold dot accent -->
<circle cx="120" cy="200" r="3" fill="#C8A45C" opacity="0.5"/>
<circle cx="680" cy="180" r="3" fill="#C8A45C" opacity="0.5"/>
<circle cx="100" cy="500" r="2" fill="#C8A45C" opacity="0.4"/>
<circle cx="700" cy="540" r="2" fill="#C8A45C" opacity="0.4"/>
</svg>
