<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 875" preserveAspectRatio="xMidYMid slice">
<defs>
  <linearGradient id="nt" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0F4327"/>
    <stop offset="100%" stop-color="#06251A"/>
  </linearGradient>
</defs>
<rect width="1400" height="875" fill="url(#nt)"/>
<!-- pitch perspective lines -->
<g stroke="#C8A45C" stroke-opacity="0.5" stroke-width="2" fill="none">
  <path d="M 100 875 L 600 200 L 800 200 L 1300 875 Z" fill="rgba(200,164,92,0.04)"/>
  <line x1="700" y1="200" x2="700" y2="875"/>
  <line x1="300" y1="700" x2="1100" y2="700"/>
  <line x1="450" y1="500" x2="950" y2="500"/>
  <line x1="550" y1="350" x2="850" y2="350"/>
  <circle cx="700" cy="500" r="80" fill="none"/>
</g>
<!-- player silhouettes scattered -->
<g fill="#F7F8FA">
  <!-- player 1 -->
  <g transform="translate(450,560)">
    <circle cx="0" cy="-50" r="14"/>
    <rect x="-12" y="-38" width="24" height="40"/>
    <rect x="-12" y="0" width="10" height="40"/>
    <rect x="2" y="0" width="10" height="40"/>
  </g>
  <g transform="translate(700,580)">
    <circle cx="0" cy="-50" r="14"/>
    <rect x="-12" y="-38" width="24" height="40"/>
    <rect x="-12" y="0" width="10" height="40"/>
    <rect x="2" y="0" width="10" height="40"/>
  </g>
  <g transform="translate(950,560)">
    <circle cx="0" cy="-50" r="14"/>
    <rect x="-12" y="-38" width="24" height="40"/>
    <rect x="-12" y="0" width="10" height="40"/>
    <rect x="2" y="0" width="10" height="40"/>
  </g>
  <g transform="translate(600,420)">
    <circle cx="0" cy="-40" r="11"/>
    <rect x="-10" y="-30" width="20" height="32"/>
    <rect x="-10" y="2" width="8" height="32"/>
    <rect x="2" y="2" width="8" height="32"/>
  </g>
  <g transform="translate(800,400)">
    <circle cx="0" cy="-40" r="11"/>
    <rect x="-10" y="-30" width="20" height="32"/>
    <rect x="-10" y="2" width="8" height="32"/>
    <rect x="2" y="2" width="8" height="32"/>
  </g>
</g>
<!-- spotlight rings around players -->
<g stroke="#C8A45C" stroke-width="2" fill="none" stroke-dasharray="4 4" opacity="0.6">
  <circle cx="450" cy="540" r="40"/>
  <circle cx="700" cy="560" r="44"/>
  <circle cx="950" cy="540" r="40"/>
</g>
<!-- scout clipboard icon top right -->
<g transform="translate(1240,140)" fill="#C8A45C">
  <rect x="-30" y="-40" width="60" height="80" rx="4"/>
  <rect x="-12" y="-50" width="24" height="14" rx="2" fill="#F7F8FA"/>
  <g fill="#F7F8FA">
    <rect x="-22" y="-20" width="44" height="3"/>
    <rect x="-22" y="-8" width="44" height="3"/>
    <rect x="-22" y="4" width="32" height="3"/>
    <rect x="-22" y="16" width="44" height="3"/>
  </g>
</g>
</svg>
